name: Rust

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ] # Tag trigger for releases
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_bridge:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
    - uses: actions/checkout@v5

    - name: Install alsa dev
      if: runner.os == 'Linux'
      run: |
          sudo apt-get update
          sudo apt-get install libasound2-dev

    - uses: Swatinem/rust-cache@v2

    - name: Build
      run: cargo build -p kissmp-bridge --verbose --release

    - name: Store Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build_results_bridge-${{ matrix.os }}
        path: |
          ./target/release/kissmp-bridge
          ./target/release/kissmp-bridge.exe

  build_server:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: linux-arm
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows
    steps:
    - uses: actions/checkout@v5

    - name: Install ARM linker
      if: matrix.target == 'aarch64-unknown-linux-gnu'
      run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

    - uses: Swatinem/rust-cache@v2

    - name: Add Rust Target
      run: rustup target add ${{ matrix.target }}

    - name: Build
      run: cargo build -p kissmp-server --verbose --release --target ${{ matrix.target }}

    - name: Store Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build_results_server-${{ matrix.name }}
        path: |
          ./target/${{ matrix.target }}/release/kissmp-server
          ./target/${{ matrix.target }}/release/kissmp-server.exe

  build_master:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
    - uses: actions/checkout@v5

    - uses: Swatinem/rust-cache@v2

    - name: Build
      run: cargo build -p kissmp-master --verbose --release

    - name: Store Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build_results_master_server
        path: |
          ./target/release/kissmp-master

  release:
    needs: [build_bridge, build_server, build_master]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v5

    # Download Linux artifacts
    - uses: actions/download-artifact@v4
      with:
        name: build_results_bridge-ubuntu-latest
        path: release_staging/linux
    - uses: actions/download-artifact@v4
      with:
        name: build_results_server-linux
        path: release_staging/linux

    # Download Windows artifacts
    - uses: actions/download-artifact@v4
      with:
        name: build_results_bridge-windows-latest
        path: release_staging/windows
    - uses: actions/download-artifact@v4
      with:
        name: build_results_server-windows
        path: release_staging/windows

    # Download ARM server artifact
    - uses: actions/download-artifact@v4
      with:
        name: build_results_server-linux-arm
        path: release_staging/linux-arm

    # Zip everything
    - name: Package Zip Files
      run: |
        cd KISSMultiplayer
        zip -r ../release_staging/KISSMultiplayer.zip .
        
        cd ../release_staging
        zip -r ../KissMP_${{ github.ref_name }}.zip *

    # Publish release
    - name: Publish GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: KissMP_${{ github.ref_name }}.zip
        name: Release ${{ github.ref_name }}